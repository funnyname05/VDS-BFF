spring.application.name=bff
server.port=${SERVER_PORT:8080}

# URLs de los microservicios — sobreescritas por variables de entorno en Docker
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
user.service.url=${USER_SERVICE_URL:http://localhost:8082}
reporte.service.url=${REPORTE_SERVICE_URL:http://localhost:8083}
alert.service.url=${ALERT_SERVICE_URL:http://localhost:8084}

# Mismo secreto — el BFF verifica el JWT localmente para evitar una llamada
# a auth-service en cada request (más eficiente)
api.security.token.secret=${JWT_SECRET:my-secret-key-that-should-be-very-long}

# CORS — origen del frontend React en desarrollo
cors.allowed.origins=http://localhost:5173
